app = "solearly-telegram-listener"
primary_region = "ord"

[build]

[env]
  SESSION_PATH = "/data/session.json"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "session_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
